<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="My Kitchen" />
<title>My Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#0e0e0f;--surface:#1a1a1c;--surface2:#242427;--border:rgba(255,255,255,0.08);
  --accent:#e8ff47;--fridge:#47ffe0;--cabinet:#e8ff47;--text:#f0f0f0;--muted:#777;--danger:#ff6b6b;
  --radius:16px;--safe-top:env(safe-area-inset-top,44px);--safe-bot:env(safe-area-inset-bottom,20px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:var(--safe-top);padding-bottom:var(--safe-bot);}
.header{padding:14px 20px 8px;flex-shrink:0;}
.header h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.5px;}
.header h1 span{color:var(--accent);}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.tabbar{display:flex;gap:5px;padding:0 20px 10px;flex-shrink:0;}
.tabbar button{flex:1;padding:8px 2px;border:1px solid var(--border);background:var(--surface);border-radius:12px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:2px;letter-spacing:0.2px;}
.tabbar button .ti{font-size:18px;}
.tabbar button.active{background:var(--accent);color:#0e0e0f;border-color:var(--accent);}
.content{flex:1;overflow-y:auto;padding:0 20px 20px;-webkit-overflow-scrolling:touch;}
.section{display:none;}.section.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:14px;}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.item-row:last-child{border-bottom:none;padding-bottom:0;}
.item-name{flex:1;font-size:14px;}
.qty-wrap{display:flex;align-items:center;gap:7px;}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.qty-btn:active{background:var(--accent);color:#0e0e0f;}
.qty-num{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;min-width:22px;text-align:center;}
.qty-unit{font-size:11px;color:var(--muted);min-width:28px;}
.del-btn{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px;}
.del-btn:active{color:var(--danger);}
.add-form{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap;}
.add-form input,.add-form select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.add-form input:focus,.add-form select:focus{border-color:var(--accent);}
.add-form input[type=text]{flex:1;min-width:90px;}
.add-form input[type=number]{width:60px;}
.add-form select{width:72px;}
.add-btn{background:var(--accent);color:#0e0e0f;border:none;border-radius:10px;padding:9px 14px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.add-btn:active{opacity:0.8;}
.pill{font-size:10px;font-weight:700;font-family:'Syne',sans-serif;padding:2px 8px;border-radius:20px;letter-spacing:0.5px;text-transform:uppercase;flex-shrink:0;}
.pill-fridge{background:rgba(71,255,224,0.15);color:var(--fridge);border:1px solid rgba(71,255,224,0.3);}
.pill-cabinet{background:rgba(232,255,71,0.15);color:var(--cabinet);border:1px solid rgba(232,255,71,0.3);}
.empty{text-align:center;padding:24px 0;color:var(--muted);font-size:14px;}
.serve-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.serve-row label{font-size:13px;color:var(--muted);white-space:nowrap;}
.serve-row input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--surface2);border-radius:4px;outline:none;}
.serve-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;}
.serve-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent);min-width:26px;text-align:center;}
.find-btn{width:100%;padding:13px;background:var(--accent);color:#0e0e0f;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
.find-btn:active{opacity:0.8;}
.recipe-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.recipe-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:6px;}
.recipe-meta{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.rbadge{font-size:11px;font-family:'Syne',sans-serif;font-weight:700;padding:3px 10px;border-radius:20px;}
.badge-full{background:rgba(71,255,224,0.15);color:var(--fridge);border:1px solid rgba(71,255,224,0.3);}
.badge-miss{background:rgba(255,107,107,0.15);color:var(--danger);border:1px solid rgba(255,107,107,0.3);}
.badge-cal{background:rgba(232,255,71,0.12);color:var(--accent);border:1px solid rgba(232,255,71,0.3);}
.cal-strip{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:10px;padding:10px 12px;margin:10px 0;}
.cal-num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);}
.cal-label{font-size:11px;color:var(--muted);}
.ing-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.ing-row:last-child{border-bottom:none;}
.ing-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.dot-have{background:var(--fridge);}.dot-miss{background:var(--danger);}
.ing-info{flex:1;}.ing-name{font-size:14px;}.ing-name.missing{color:var(--danger);}
.ing-buy{font-size:11px;color:var(--muted);margin-top:2px;}
.ing-amount{font-size:12px;color:var(--muted);white-space:nowrap;}
.recipe-divider{height:1px;background:var(--border);margin:12px 0;}
.recipe-steps{font-size:13px;color:var(--muted);line-height:1.7;}
.ing-preview{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.ing-chip{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;gap:5px;}
.chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.loading-wrap{text-align:center;padding:32px 0;}
.spinner{width:32px;height:32px;border:3px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-wrap p{font-size:13px;color:var(--muted);}

/* SCAN TAB */
.scan-hero{display:flex;flex-direction:column;align-items:center;gap:16px;}
.scan-btn-big{width:100%;padding:28px 20px;background:var(--surface);border:2px dashed rgba(232,255,71,0.35);border-radius:20px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all 0.2s;}
.scan-btn-big:active{background:var(--surface2);}
.scan-icon-big{font-size:56px;}
.scan-lbl{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--accent);}
.scan-desc{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;max-width:260px;}

/* Scanner fullscreen overlay */
.scan-overlay{position:fixed;inset:0;background:#000;z-index:100;display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bot);}
.scan-overlay.hidden{display:none;}
.scan-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#000;}
.scan-hdr h2{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;}
.close-btn{background:rgba(255,255,255,0.1);border:none;color:#fff;border-radius:10px;padding:7px 14px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.video-wrap{position:relative;flex:1;overflow:hidden;background:#000;}
#scanner-video{width:100%;height:100%;object-fit:cover;}
.scan-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.scan-box{width:260px;height:160px;position:relative;}
.scan-corner{position:absolute;width:30px;height:30px;border-color:var(--accent);border-style:solid;}
.sc-tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.sc-tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
.sc-bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
.sc-br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
.scan-line{position:absolute;left:8px;right:8px;height:2px;background:var(--accent);opacity:0.9;animation:scanline 2s ease-in-out infinite;}
@keyframes scanline{0%{top:10px;}50%{top:calc(100% - 12px);}100%{top:10px;}}
.scan-hint-bar{padding:10px 20px;text-align:center;font-size:13px;color:rgba(255,255,255,0.5);background:#000;}
.manual-row{display:flex;gap:8px;padding:10px 20px;background:#000;}
.manual-row input{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:10px;padding:10px 12px;font-size:14px;outline:none;}
.manual-row input::placeholder{color:rgba(255,255,255,0.3);}
.manual-row button{background:var(--accent);color:#0e0e0f;border:none;border-radius:10px;padding:10px 16px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

/* Result sheet */
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;}
.result-overlay.hidden{display:none;}
.result-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:20px;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bot));}
.drag-bar{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.r-product-name{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;margin-bottom:3px;}
.r-brand{font-size:13px;color:var(--muted);margin-bottom:16px;}
.loc-card{border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:14px;}
.loc-fridge-card{background:rgba(71,255,224,0.08);border:1px solid rgba(71,255,224,0.25);}
.loc-cabinet-card{background:rgba(232,255,71,0.08);border:1px solid rgba(232,255,71,0.25);}
.loc-icon{font-size:38px;flex-shrink:0;}
.loc-text h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:4px;}
.loc-text p{font-size:13px;color:var(--muted);line-height:1.55;}
.loc-text .tip{margin-top:6px;font-size:12px;color:var(--muted);font-style:italic;}
.nutr-box{background:var(--surface2);border-radius:14px;padding:14px;margin-bottom:14px;}
.nutr-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
.nutr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.nutr-item{background:var(--surface);border-radius:10px;padding:10px;}
.nutr-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.nutr-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.qty-row label{font-size:14px;color:var(--muted);white-space:nowrap;}
.rqty-wrap{display:flex;align-items:center;gap:10px;flex:1;}
.rqty-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.rqty-btn:active{background:var(--accent);color:#0e0e0f;}
.rqty-num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;min-width:32px;text-align:center;}
.unit-sel{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 10px;font-size:13px;outline:none;}
.add-inv-btn{width:100%;padding:14px;background:var(--accent);color:#0e0e0f;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:10px;}
.add-inv-btn:active{opacity:0.8;}
.cancel-btn{width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.scan-loading{text-align:center;padding:40px 0;}
.scan-spinner{width:28px;height:28px;border:3px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
.scan-spinner p{font-size:13px;color:var(--muted);}
.recent-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.recent-item:last-child{border-bottom:none;}
.recent-name{flex:1;font-size:14px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>My <span>Kitchen</span></h1>
    <div class="header-sub" id="header-sub">Loading...</div>
  </div>
  <div class="tabbar">
    <button class="active" onclick="showTab('fridge')"><span class="ti">🧊</span>Fridge</button>
    <button onclick="showTab('cabinet')"><span class="ti">🗄</span>Cabinet</button>
    <button onclick="showTab('recipes')"><span class="ti">👨‍🍳</span>Recipes</button>
    <button onclick="showTab('scan')"><span class="ti">📷</span>Scan</button>
  </div>
  <div class="content">

    <!-- FRIDGE -->
    <div id="sec-fridge" class="section active">
      <div class="card">
        <div class="card-title">Fridge items</div>
        <div id="fridge-list"></div>
        <div class="add-form">
          <input type="text" id="fridge-name" placeholder="Item name" />
          <input type="number" id="fridge-qty" value="1" min="0" step="0.5" />
          <select id="fridge-unit"><option>pcs</option><option>cups</option><option>oz</option><option>lbs</option><option>ml</option><option>L</option><option>g</option><option>kg</option><option>tbsp</option></select>
          <button class="add-btn" onclick="addItem('fridge')">+ Add</button>
        </div>
      </div>
    </div>

    <!-- CABINET -->
    <div id="sec-cabinet" class="section">
      <div class="card">
        <div class="card-title">Cabinet items</div>
        <div id="cabinet-list"></div>
        <div class="add-form">
          <input type="text" id="cabinet-name" placeholder="Item name" />
          <input type="number" id="cabinet-qty" value="1" min="0" step="0.5" />
          <select id="cabinet-unit"><option>pcs</option><option>cups</option><option>oz</option><option>lbs</option><option>ml</option><option>L</option><option>g</option><option>kg</option><option>tbsp</option></select>
          <button class="add-btn" onclick="addItem('cabinet')">+ Add</button>
        </div>
      </div>
    </div>

    <!-- RECIPES -->
    <div id="sec-recipes" class="section">
      <div class="card">
        <div class="card-title">Settings</div>
        <div class="serve-row">
          <label>Servings</label>
          <input type="range" min="1" max="12" value="2" id="serve-slider" oninput="document.getElementById('serve-num').textContent=this.value" />
          <span class="serve-num" id="serve-num">2</span>
        </div>
        <div id="ing-preview" class="ing-preview"></div>
        <button class="find-btn" onclick="findRecipes()">Find Recipes</button>
      </div>
      <div id="recipes-out"></div>
    </div>

    <!-- SCAN -->
    <div id="sec-scan" class="section">
      <div class="card">
        <div class="card-title">Barcode scanner</div>
        <div class="scan-btn-big" onclick="openScanner()">
          <div class="scan-icon-big">📷</div>
          <div class="scan-lbl">Scan a Barcode</div>
          <div class="scan-desc">At the store? Scan any product — we'll tell you exactly where it goes at home (Fridge or Cabinet) and let you set the quantity.</div>
        </div>
      </div>
      <div class="card" id="recent-card" style="display:none;">
        <div class="card-title">Recently scanned</div>
        <div id="recent-list"></div>
      </div>
    </div>

  </div>
</div>

<!-- SCANNER OVERLAY -->
<div class="scan-overlay hidden" id="scan-overlay">
  <div class="scan-hdr">
    <h2>Scan Barcode</h2>
    <button class="close-btn" onclick="closeScanner()">✕ Close</button>
  </div>
  <div class="video-wrap">
    <video id="scanner-video" autoplay playsinline muted></video>
    <div class="scan-frame">
      <div class="scan-box">
        <div class="scan-corner sc-tl"></div><div class="scan-corner sc-tr"></div>
        <div class="scan-corner sc-bl"></div><div class="scan-corner sc-br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
  </div>
  <div class="scan-hint-bar">Hold steady — point at barcode</div>
  <div class="manual-row">
    <input type="text" id="manual-barcode" placeholder="Or type barcode number..." inputmode="numeric" />
    <button onclick="lookupManual()">Look up</button>
  </div>
</div>

<!-- RESULT SHEET -->
<div class="result-overlay hidden" id="result-overlay">
  <div class="result-sheet">
    <div class="drag-bar"></div>
    <div id="result-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.1/umd/index.min.js"></script>
<script>
const DEFAULTS={
  fridge:[
    {name:'Milk',qty:1,unit:'pcs'},{name:'Eggs',qty:3,unit:'pcs'},
    {name:'Mozzarella Cheese',qty:1,unit:'pcs'},{name:'Mexican Cheese',qty:2,unit:'pcs'},
    {name:'Sprite',qty:2,unit:'pcs'},{name:'Red Bull',qty:1,unit:'pcs'},
    {name:'Ground Beef',qty:1,unit:'pcs'},{name:'Guacamole',qty:1,unit:'pcs'},
    {name:'Corn Tortillas',qty:1,unit:'pcs'},{name:'Flour Tortillas',qty:1,unit:'pcs'},
    {name:'Sourdough',qty:1,unit:'pcs'},{name:'Pickled Jalapeños',qty:1,unit:'pcs'},
    {name:'Bag of Salad',qty:1,unit:'pcs'}
  ],
  cabinet:[
    {name:'Pepper',qty:1,unit:'pcs'},{name:'Salt',qty:1,unit:'pcs'},
    {name:'Olive Oil',qty:1,unit:'pcs'},{name:'Garlic Powder',qty:1,unit:'pcs'},
    {name:'Chili Onion Oil',qty:1,unit:'pcs'},{name:'Garlic Clove',qty:1,unit:'pcs'},
    {name:'Butter',qty:1,unit:'pcs'},{name:'Vinegar',qty:1,unit:'pcs'},
    {name:'Basil',qty:1,unit:'pcs'},{name:'Oregano',qty:1,unit:'pcs'}
  ]
};

let inv={fridge:[],cabinet:[]};
let recentScans=[];
let scanQty=1;
let currentProduct=null;
let codeReader=null;
let scanActive=false;

function save(){try{localStorage.setItem('myKitchen_v4',JSON.stringify({inv,recentScans}));}catch(e){}}
function load(){
  try{const d=localStorage.getItem('myKitchen_v4');if(d){const p=JSON.parse(d);inv=p.inv||JSON.parse(JSON.stringify(DEFAULTS));recentScans=p.recentScans||[];return true;}}catch(e){}
  return false;
}

function showTab(t){
  ['fridge','cabinet','recipes','scan'].forEach((s,i)=>{
    document.querySelectorAll('.tabbar button')[i].classList.toggle('active',s===t);
    document.getElementById('sec-'+s).classList.toggle('active',s===t);
  });
  if(t==='recipes') updatePreview();
  if(t==='scan') renderRecent();
}

function addItem(loc){
  const n=document.getElementById(loc+'-name').value.trim();if(!n)return;
  const q=parseFloat(document.getElementById(loc+'-qty').value)||1;
  const u=document.getElementById(loc+'-unit').value;
  inv[loc].push({name:n,qty:q,unit:u});
  document.getElementById(loc+'-name').value='';document.getElementById(loc+'-qty').value=1;
  save();render(loc);updateHeaderSub();
}
function changeQty(loc,i,d){inv[loc][i].qty=Math.max(0,+(inv[loc][i].qty+d).toFixed(1));save();render(loc);}
function delItem(loc,i){inv[loc].splice(i,1);save();render(loc);updateHeaderSub();}

function render(loc){
  const el=document.getElementById(loc+'-list');
  if(!inv[loc].length){el.innerHTML='<div class="empty">Nothing here yet</div>';return;}
  el.innerHTML=inv[loc].map((it,i)=>`
    <div class="item-row">
      <span class="item-name">${it.name}</span>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="changeQty('${loc}',${i},-0.5)">−</button>
        <span class="qty-num">${it.qty}</span>
        <span class="qty-unit">${it.unit}</span>
        <button class="qty-btn" onclick="changeQty('${loc}',${i},0.5)">+</button>
      </div>
      <button class="del-btn" onclick="delItem('${loc}',${i})">✕</button>
    </div>`).join('');
}

function updateHeaderSub(){
  document.getElementById('header-sub').textContent=`${inv.fridge.length} fridge · ${inv.cabinet.length} cabinet`;
}
function updatePreview(){
  const el=document.getElementById('ing-preview');
  const all=[...inv.fridge.map(i=>({...i,loc:'fridge'})),...inv.cabinet.map(i=>({...i,loc:'cabinet'}))];
  if(!all.length){el.innerHTML='<span style="font-size:13px;color:var(--muted)">Add ingredients first</span>';return;}
  el.innerHTML=all.map(i=>`<div class="ing-chip"><span class="chip-dot" style="background:${i.loc==='fridge'?'var(--fridge)':'var(--cabinet)'}"></span>${i.name}</div>`).join('');
}

/* RECIPES */
async function findRecipes(){
  const servings=parseInt(document.getElementById('serve-num').textContent);
  const all=[...inv.fridge.map(i=>`${i.qty} ${i.unit} ${i.name} (Fridge)`),...inv.cabinet.map(i=>`${i.qty} ${i.unit} ${i.name} (Cabinet)`)];
  if(!all.length){alert('Add some ingredients first!');return;}
  const out=document.getElementById('recipes-out');
  out.innerHTML='<div class="loading-wrap"><div class="spinner"></div><p>Finding recipes...</p></div>';
  const prompt=`You are a cooking assistant. The user has: ${all.join(', ')}.
Generate exactly 3 recipes for ${servings} serving(s). Reply ONLY with valid JSON, no markdown, no extra text:
{"recipes":[{"title":"string","steps":"2-3 sentence instructions","calories_per_serving":number,"ingredients":[{"name":"string","amount":"scaled for ${servings} servings","have":true,"location":"Fridge or Cabinet or null","buyAt":"store section if missing, else null"}]}]}
calories_per_serving must be a realistic integer. Only mark have:true if ingredient closely matches the user list. Scale amounts to ${servings} servings.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1400,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    renderRecipes(JSON.parse(text).recipes,servings);
  }catch(e){out.innerHTML='<div class="card"><div class="empty">Couldn\'t load — try again</div></div>';}
}

function renderRecipes(recipes,servings){
  document.getElementById('recipes-out').innerHTML=recipes.map(r=>{
    const have=r.ingredients.filter(i=>i.have).length,total=r.ingredients.length;
    const ingHtml=r.ingredients.map(ing=>`
      <div class="ing-row">
        <span class="ing-dot ${ing.have?'dot-have':'dot-miss'}"></span>
        <div class="ing-info">
          <span class="ing-name ${ing.have?'':'missing'}">${ing.name}${ing.have&&ing.location?` <span class="pill pill-${ing.location.toLowerCase()}">${ing.location}</span>`:''}</span>
          ${!ing.have&&ing.buyAt?`<div class="ing-buy">Find: ${ing.buyAt}</div>`:''}
        </div>
        <span class="ing-amount">${ing.amount}</span>
      </div>`).join('');
    return `<div class="recipe-card">
      <div class="recipe-name">${r.title}</div>
      <div class="recipe-meta">
        <span class="rbadge ${have===total?'badge-full':'badge-miss'}">${have}/${total} on hand</span>
        <span class="rbadge badge-cal">🔥 ${r.calories_per_serving} cal/serving</span>
      </div>
      <div class="cal-strip">
        <div><div class="cal-num">${r.calories_per_serving}</div><div class="cal-label">cal / serving</div></div>
        <div style="width:1px;background:var(--border);height:32px;margin:0 4px;"></div>
        <div><div class="cal-num" style="font-size:15px">${Math.round(r.calories_per_serving*servings)}</div><div class="cal-label">total · ${servings} serving${servings!==1?'s':''}</div></div>
      </div>
      ${ingHtml}
      <div class="recipe-divider"></div>
      <div class="recipe-steps">${r.steps}</div>
    </div>`;
  }).join('');
}

/* SCANNER */
async function openScanner(){
  document.getElementById('scan-overlay').classList.remove('hidden');
  scanActive=true;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    const video=document.getElementById('scanner-video');
    video.srcObject=stream;await video.play();
    if(typeof ZXingBrowser!=='undefined'){
      try{
        codeReader=new ZXingBrowser.BrowserMultiFormatReader();
        codeReader.decodeFromVideoElement(video,(result,err)=>{
          if(result&&scanActive){scanActive=false;closeCamera();lookupBarcode(result.getText());}
        });
      }catch(e){}
    }
  }catch(e){
    document.querySelector('.scan-hint-bar').textContent='Camera unavailable — use the text box below';
  }
}

function closeCamera(){
  try{const v=document.getElementById('scanner-video');if(v.srcObject)v.srcObject.getTracks().forEach(t=>t.stop());v.srcObject=null;}catch(e){}
  if(codeReader){try{codeReader.reset();}catch(e){}codeReader=null;}
}

function closeScanner(){scanActive=false;closeCamera();document.getElementById('scan-overlay').classList.add('hidden');}

function lookupManual(){
  const val=document.getElementById('manual-barcode').value.trim();
  if(!val)return;
  closeScanner();lookupBarcode(val);
}

async function lookupBarcode(barcode){
  showResultLoading();
  let productName='Unknown Product',brand='',nutrition={calories:0,protein:0,carbs:0,fat:0};
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const d=await r.json();
    if(d.status===1&&d.product){
      const p=d.product;
      productName=p.product_name||p.product_name_en||'Unknown Product';
      brand=p.brands||'';
      const n=p.nutriments||{};
      nutrition={
        calories:Math.round(n['energy-kcal_100g']||n['energy-kcal']||0),
        protein:Math.round((n.proteins_100g||0)*10)/10,
        carbs:Math.round((n.carbohydrates_100g||0)*10)/10,
        fat:Math.round((n.fat_100g||0)*10)/10
      };
    }
  }catch(e){}

  const prompt=`Product name: "${productName}", barcode: ${barcode}.
Reply ONLY with valid JSON, no markdown:
{"name":"full product name","brand":"brand name","location":"Fridge or Cabinet","reason":"one sentence why it goes there","suggestedUnit":"pcs","tip":"one short useful shopping or storage tip"}
Fridge = needs refrigeration (dairy, meat, fresh produce, drinks, eggs, opened condiments).
Cabinet = shelf-stable (canned goods, dry pasta, spices, oils, cereal, snacks, baking supplies).`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const ai=JSON.parse(text);
    currentProduct={name:ai.name||productName,brand:ai.brand||brand,barcode,location:ai.location,reason:ai.reason,tip:ai.tip,suggestedUnit:ai.suggestedUnit||'pcs',nutrition};
  }catch(e){
    currentProduct={name:productName,brand,barcode,location:'Cabinet',reason:'Could not determine automatically.',tip:'',suggestedUnit:'pcs',nutrition};
  }
  scanQty=1;showResultSheet(currentProduct);
}

function showResultLoading(){
  document.getElementById('result-overlay').classList.remove('hidden');
  document.getElementById('result-content').innerHTML=`<div class="scan-loading"><div class="scan-spinner"></div><p style="font-size:13px;color:var(--muted);margin-top:10px;">Looking up product...</p></div>`;
}

function showResultSheet(p){
  const isF=p.location==='Fridge';
  const units=['pcs','cups','oz','lbs','ml','L','g','kg','tbsp'];
  const unitOpts=units.map(u=>`<option ${u===p.suggestedUnit?'selected':''}>${u}</option>`).join('');
  document.getElementById('result-content').innerHTML=`
    <div class="r-product-name">${p.name}</div>
    <div class="r-brand">${p.brand||'Brand unknown'} · ${p.barcode}</div>
    <div class="loc-card ${isF?'loc-fridge-card':'loc-cabinet-card'}">
      <div class="loc-icon">${isF?'🧊':'🗄'}</div>
      <div class="loc-text">
        <h3 style="color:${isF?'var(--fridge)':'var(--cabinet)'}">${p.location}</h3>
        <p>${p.reason}</p>
        ${p.tip?`<p class="tip">${p.tip}</p>`:''}
      </div>
    </div>
    ${p.nutrition.calories>0?`<div class="nutr-box">
      <div class="nutr-title">Nutrition per 100g</div>
      <div class="nutr-grid">
        <div class="nutr-item"><div class="nutr-val" style="color:var(--accent)">${p.nutrition.calories}</div><div class="nutr-lbl">Calories</div></div>
        <div class="nutr-item"><div class="nutr-val">${p.nutrition.protein}g</div><div class="nutr-lbl">Protein</div></div>
        <div class="nutr-item"><div class="nutr-val">${p.nutrition.carbs}g</div><div class="nutr-lbl">Carbs</div></div>
        <div class="nutr-item"><div class="nutr-val">${p.nutrition.fat}g</div><div class="nutr-lbl">Fat</div></div>
      </div></div>`:''}
    <div class="qty-row">
      <label>Quantity</label>
      <div class="rqty-wrap">
        <button class="rqty-btn" onclick="changeRQty(-1)">−</button>
        <span class="rqty-num" id="rqty-num">1</span>
        <button class="rqty-btn" onclick="changeRQty(1)">+</button>
        <select class="unit-sel" id="runit-sel">${unitOpts}</select>
      </div>
    </div>
    <button class="add-inv-btn" onclick="addScanned()">Add to ${p.location}</button>
    <button class="cancel-btn" onclick="closeResult()">Cancel</button>`;
}

function changeRQty(d){scanQty=Math.max(1,scanQty+d);document.getElementById('rqty-num').textContent=scanQty;}

function addScanned(){
  if(!currentProduct)return;
  const loc=currentProduct.location==='Fridge'?'fridge':'cabinet';
  const unit=document.getElementById('runit-sel').value;
  inv[loc].push({name:currentProduct.name,qty:scanQty,unit});
  recentScans.unshift({name:currentProduct.name,location:currentProduct.location,barcode:currentProduct.barcode});
  if(recentScans.length>10)recentScans.pop();
  save();render(loc);updateHeaderSub();closeResult();showTab(loc);
}

function closeResult(){document.getElementById('result-overlay').classList.add('hidden');currentProduct=null;}

function renderRecent(){
  const card=document.getElementById('recent-card');
  const list=document.getElementById('recent-list');
  if(!recentScans.length){card.style.display='none';return;}
  card.style.display='block';
  list.innerHTML=recentScans.map(s=>`
    <div class="recent-item">
      <span style="font-size:20px">${s.location==='Fridge'?'🧊':'🗄'}</span>
      <span class="recent-name">${s.name}</span>
      <span class="pill ${s.location==='Fridge'?'pill-fridge':'pill-cabinet'}">${s.location}</span>
    </div>`).join('');
}

// Boot
if(!load()){inv=JSON.parse(JSON.stringify(DEFAULTS));save();}
render('fridge');render('cabinet');updateHeaderSub();
document.getElementById('fridge-name').addEventListener('keydown',e=>{if(e.key==='Enter')addItem('fridge');});
document.getElementById('cabinet-name').addEventListener('keydown',e=>{if(e.key==='Enter')addItem('cabinet');});
</script>
